name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  lint:
    name: Lint JS (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run lint

  test:
    name: Tests Python (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r web/requirements-dev.txt
      # Tests rapides et déterministes (le test navigateur exige un serveur +
      # un navigateur + le réseau Kick/Twitch ; il est exclu de la CI).
      - run: python -m pytest tests/test_api.py tests/test_security.py -q
        working-directory: web
