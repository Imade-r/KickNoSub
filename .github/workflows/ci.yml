name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  lint:
    name: Lint JS (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run lint

  test:
    name: Tests Python (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r web/requirements-dev.txt
      # Tests rapides et déterministes (sans navigateur ni réseau).
      - run: python -m pytest tests/test_api.py tests/test_security.py -q
        working-directory: web

  e2e:
    name: Test navigateur (Playwright, mocké)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r web/requirements-dev.txt
      - run: python -m playwright install --with-deps chromium
      # Test déterministe : toutes les routes API sont mockées, la fixture
      # démarre le serveur. Attrape la classe de bugs « présent mais cassé »
      # (downloadModal, hlsPlayer, CSP worker, preloadVOD…) à chaque push.
      - run: python -m pytest tests/test_browser.py::test_player_actions_with_mocked_vod -q
        working-directory: web
        env:
          KNS_BASE_URL: "http://127.0.0.1:5000"
